<div class="arena-wrapper">
    <canvas
        #canvas
        [width]="arenaW"
        [height]="arenaH"
        class="arena-canvas"
        [class.my-turn]="canShoot"
        (mousemove)="onMouseMove($event)"
        (mouseleave)="onMouseLeave()"
        (click)="onCanvasClick($event)"
        (touchstart)="onTouchStart($event)"
    ></canvas>
</div>
