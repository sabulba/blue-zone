<div class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">🎱 Blue Zone</div>
    <p class="auth-subtitle">Multiplayer billiards</p>

    @if (!resetMode) {

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn" [class.active]="tab === 'signin'" (click)="selectTab('signin')">Sign in</button>
        <button class="tab-btn" [class.active]="tab === 'signup'" (click)="selectTab('signup')">Sign up</button>
      </div>

      <!-- Google button -->
      <button class="btn-google" (click)="signInWithGoogle()" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Sign in form -->
      @if (tab === 'signin') {
        <div class="auth-form">
          <input class="auth-input" type="email"    placeholder="Email"    [(ngModel)]="email"    [disabled]="loading" />
          <input class="auth-input" type="password" placeholder="Password" [(ngModel)]="password" [disabled]="loading" />
          <button class="btn-primary" (click)="signIn()" [disabled]="loading || !canSignIn">
            @if (loading) { <span class="spinner-sm"></span> } @else { Sign in }
          </button>
          <button class="btn-link" (click)="resetMode = true">Forgot password?</button>
        </div>
      }

      <!-- Sign up form -->
      @if (tab === 'signup') {
        <div class="auth-form">
          <input class="auth-input" type="text"     placeholder="Your name" [(ngModel)]="displayName" [disabled]="loading" />
          <input class="auth-input" type="email"    placeholder="Email"     [(ngModel)]="email"        [disabled]="loading" />
          <input class="auth-input" type="password" placeholder="Password"  [(ngModel)]="password"     [disabled]="loading" />
          <button class="btn-primary" (click)="signUp()" [disabled]="loading || !canSignUp">
            @if (loading) { <span class="spinner-sm"></span> } @else { Create account }
          </button>
        </div>
      }

    } @else {

      <!-- Reset password -->
      <div class="auth-form">
        <h3 class="reset-title">Reset password</h3>
        @if (!resetSent) {
          <p class="reset-hint">Enter your email and we'll send a reset link.</p>
          <input class="auth-input" type="email" placeholder="Email" [(ngModel)]="resetEmail" [disabled]="loading" />
          <button class="btn-primary" (click)="sendReset()" [disabled]="loading || !resetEmail">
            @if (loading) { <span class="spinner-sm"></span> } @else { Send reset link }
          </button>
        } @else {
          <p class="reset-sent">✅ Link sent! Check your inbox.</p>
        }
        <button class="btn-link" (click)="resetMode = false">← Back to sign in</button>
      </div>

    }

  </div>

  <!-- Bottom toast -->
  @if (toast) {
    <div class="auth-toast">{{ toast }}</div>
  }

</div>
